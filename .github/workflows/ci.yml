name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        destination:
          - 'platform=iOS Simulator,name=iPhone 16,OS=latest'
          - 'platform=iOS Simulator,name=iPhone SE (3rd generation),OS=latest'
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme TapTagKit \
            -destination '${{ matrix.destination }}' \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # SwiftLint ships pre-installed on GitHub's macOS runner images.
      - name: SwiftLint
        run: swiftlint lint --strict

  docs:
    name: Build documentation
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Fail the build on broken DocC references (they are warnings otherwise),
      # so documentation can't rot unnoticed.
      - name: Build DocC
        run: |
          set -o pipefail
          xcodebuild docbuild \
            -scheme TapTagKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            OTHER_DOCC_FLAGS='--warnings-as-errors' \
            CODE_SIGNING_ALLOWED=NO
